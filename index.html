<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>fxesplus-1 Compiler UI</title>
  <style>
    body { font-family: system-ui, -apple-system, Roboto, "Segoe UI", Arial; margin: 24px; }
    textarea { width: 100%; height: 320px; font-family: monospace; }
    pre { background:#f6f8fa; padding:12px; border-radius:6px; overflow:auto }
    .row { display:flex; gap:8px; margin-top:8px }
  </style>
</head>
<body>
  <h1>fxesplus-1 Compiler (local)</h1>
  <p>This simple UI expects you to run the Node compiler locally. It helps prepare input and shows output.</p>

  <label for="program">Program source (assembly-like):</label>
  <textarea id="program">; paste your program here
</textarea>

  <div class="row">
    <button id="run">Run (via CLI)</button>
    <button id="copy">Copy to clipboard</button>
    <select id="format"><option value="key">key</option><option value="hex">hex</option></select>
  </div>

  <h2>Output</h2>
  <pre id="output">(Run locally: node 570esp/compiler.js -t overflow -f key &lt; program.txt)</pre>

  <script>
    const run = document.getElementById('run');
    const copy = document.getElementById('copy');
    const program = document.getElementById('program');
    const output = document.getElementById('output');
    const format = document.getElementById('format');

    run.addEventListener('click', () => {
      output.textContent = 'This page cannot execute the compiler inside your browser.\nRun locally:\nnode 570esp/compiler.js -t overflow -f ' + format.value + ' < program.txt\n\nOr use the repo scripts to run it.';
    });

    copy.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(program.value);
        output.textContent = 'Program copied to clipboard';
      } catch (e) {
        output.textContent = 'Copy failed: ' + e.message;
      }
    });
  </script>
</body>
</html>
